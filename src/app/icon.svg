<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <style>
    .bg     { fill: #faf7f2; }
    .ink    { fill: none; stroke: #1a1612; stroke-width: 1.6; stroke-linecap: square; }
    .spine  { fill: none; stroke: #1a1612; stroke-width: 1.6; stroke-opacity: 0.5; }
    .brass  { fill: #b08d57; }
    @media (prefers-color-scheme: dark) {
      .bg     { fill: #0c0a08; }
      .ink    { stroke: #ede5d6; }
      .spine  { stroke: #ede5d6; stroke-opacity: 0.55; }
      .brass  { fill: #d6b079; }
    }
  </style>
  <rect class="bg" width="32" height="32" rx="6" />
  <rect class="ink" x="5.5" y="5.5" width="21" height="21" rx="0.5" />
  <line class="ink" x1="5.5"  y1="11"   x2="26.5" y2="11" />
  <line class="ink" x1="5.5"  y1="16"   x2="20"   y2="16" />
  <line class="ink" x1="5.5"  y1="21"   x2="26.5" y2="21" />
  <line class="spine" x1="11" y1="5.5"  x2="11"   y2="26.5" />
  <circle class="brass" cx="23.5" cy="16" r="1.4" />
</svg>
